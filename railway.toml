[phases.setup]
apt = ["gcc", "postgresql-client"]

[phases.build]
pip = ["requirements.txt"]

[services]
[[services]]
name = "backend"
buildCommand = "cd backend && pip install -r requirements.txt"
startCommand = "cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT"
healthcheckPath = "/health"

[env]
PYTHON_VERSION = "3.11"
